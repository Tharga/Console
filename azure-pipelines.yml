trigger:
- v4-pre

variables:
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'
  BQC.ForceNewBaseline: false
  majorMinor: '4.0'

stages:
- stage: Build
  displayName: Build
  jobs:
  - job: Build
    displayName: Build and Test

    steps:
  - checkout: self

  - template: buildnumber.yml
    parameters:
      majorMinor: ${{ variables.majorMinor }}

    - task: UseDotNet@2
      displayName: 'Use .NET 10'
      inputs:
        version: 10.0.x
        includePreviewVersions: false

    - task: NuGetToolInstaller@1

    - task: DotNetCoreCLI@2
      displayName: 'Restore nuget packages'
      inputs:
        command: 'restore'
        projects: '**/Tharga.Console*.csproj'
        feedsToUse: 'select'

    - task: DotNetCoreCLI@2
      displayName: 'Build'
      inputs:
        command: 'build'
        projects: '**/Tharga.Console*.csproj'
        arguments: '-c Release'
        versioningScheme: 'byBuildNumber'

    - task: DotNetCoreCLI@2
      displayName: 'Test'
      inputs:
        command: 'test'
        projects: '**/Tharga.Console*.Tests.csproj'
        arguments: '--collect "Code coverage" --configuration $(buildConfiguration) --filter "Category!=Database"'

    # - task: BuildQualityChecks@8
    #   displayName: 'Build Quality Checks'
    #   inputs:
    #     checkWarnings: true
    #     warningFailOption: 'build'
    #     allowWarningVariance: true
    #     warningVariance: '1'
    #     checkCoverage: true
    #     coverageFailOption: 'build'
    #     coverageType: 'blocks'
    #     allowCoverageVariance: true
    #     coverageVariance: '1'

    - task: DotNetCoreCLI@2
      displayName: 'Pack Tharga.Console'
      inputs:
        command: 'pack'
        packagesToPack: '**/Tharga.Console.csproj'
        versioningScheme: 'byEnvVar'
        versionEnvVar: 'BUILD_BUILDNUMBER'
        arguments: '-c $(buildConfiguration) -o $(Build.ArtifactStagingDirectory)'

    - task: DotNetCoreCLI@2
      displayName: 'Pack Tharga.Console.Speech'
      inputs:
        command: 'pack'
        packagesToPack: '**/Tharga.Console.Speech.csproj'
        versioningScheme: 'byEnvVar'
        versionEnvVar: 'BUILD_BUILDNUMBER'
        arguments: '-c $(buildConfiguration) -o $(Build.ArtifactStagingDirectory)'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish artifacts'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'

- stage: Release
  displayName: Release
  dependsOn: Build
  # condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'master'))
  jobs:
  - job: Release
    displayName: Release

    steps:
    - download: current
      artifact: drop
    - checkout: self
      persistCredentials: true

    # - task: NuGetCommand@2
    #   displayName: 'Push nuget packages to nuget.org'
    #   inputs:
    #     command: 'push'
    #     packagesToPush: '$(Pipeline.Workspace)/**/*.symbols.nupkg'
    #     nuGetFeedType: 'external'
    #     publishFeedCredentials: 'Nuget.org'

    - bash: |
        ls -la "$(Pipeline.Workspace)/drop"
      displayName: List downloaded packages

    - bash: |
        if [ -z "$(NUGET_API_KEY)" ]; then
          echo "NUGET_API_KEY is empty (not set / not available to this stage)."
          exit 1
        fi
        echo "NUGET_API_KEY is set."
      displayName: Check NuGet API key is present

    - task: DotNetCoreCLI@2
      displayName: Push nuget packages to nuget.org
      inputs:
        command: custom
        custom: nuget
        arguments: >
          push "$(Pipeline.Workspace)/drop/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key $(NUGET_API_KEY)
          --skip-duplicate

    - script: |
         git tag $(Build.BuildNumber)
         git push origin $(Build.BuildNumber)
      workingDirectory: $(Build.SourcesDirectory)
      displayName: Tag
